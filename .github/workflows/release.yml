name: Release (anylinux amd64)

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    name: Build anylinux amd64 tarball

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build tarball in Alpine container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            --platform linux/amd64 \
            alpine:3.20 sh -c '
              set -ex
              apk add --no-cache \
                build-base autoconf bison flex gperf readline-dev bzip2-dev \
                perl python3 git patchelf
              git config --global --add safe.directory /src
              autoconf
              ./configure --prefix=/usr/local
              make -j$(nproc)
              make DESTDIR=/tmp/install install

              # Bundle shared library dependencies and set RPATHs
              STAGE=/tmp/install/usr/local
              mkdir -p "$STAGE/lib"

              copy_deps() {
                for f in "$@"; do
                  [ -f "$f" ] || continue
                  ldd "$f" 2>/dev/null | awk "/=>/ {print \$3}" | while read -r lib; do
                    [ -f "$lib" ] || continue
                    base=$(basename "$lib")
                    case "$base" in ld-musl-*|libc.musl-*) continue ;; esac
                    [ -f "$STAGE/lib/$base" ] || cp "$lib" "$STAGE/lib/$base"
                  done
                done
              }

              copy_deps "$STAGE"/bin/*
              copy_deps "$STAGE"/lib/ivl/*
              copy_deps "$STAGE"/lib/*.so*

              for f in "$STAGE"/bin/*; do
                [ -f "$f" ] && patchelf --set-rpath "\$ORIGIN/../lib" "$f" 2>/dev/null || true
              done
              for f in "$STAGE"/lib/ivl/*; do
                [ -f "$f" ] && patchelf --set-rpath "\$ORIGIN/.." "$f" 2>/dev/null || true
              done
              for f in "$STAGE"/lib/*.so*; do
                [ -f "$f" ] && patchelf --set-rpath "\$ORIGIN" "$f" 2>/dev/null || true
              done

              cd /tmp/install
              tar czf /src/iverilog-anylinux-amd64.tar.gz .
            '

      - name: Generate release notes
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          FULL_SHA=$(git rev-parse HEAD)
          DATE=$(date -u +%Y-%m-%d)
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          printf '%s\n' \
            "Automated build from \`master\` @ [\`${SHORT_SHA}\`](${REPO_URL}/commit/${FULL_SHA})" \
            "" \
            "**Platform:** Linux amd64 (Alpine-based, portable across Linux distros)" \
            "**Built:** ${DATE}" \
            "" \
            "### Installation" \
            "\`\`\`bash" \
            "sudo tar xzf iverilog-anylinux-amd64.tar.gz -C /" \
            "\`\`\`" \
            > release_notes.md

      - name: Create permanent release
        run: |
          TAG="build-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.short_sha }}"
          gh release create "$TAG" \
            iverilog-anylinux-amd64.tar.gz \
            --target "${{ github.sha }}" \
            --title "Build ${{ steps.meta.outputs.date }} (${{ steps.meta.outputs.short_sha }})" \
            --notes-file release_notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest release
        run: |
          git tag -f latest HEAD
          git push -f origin latest
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest \
            iverilog-anylinux-amd64.tar.gz \
            --target "${{ github.sha }}" \
            --title "Latest Build (${{ steps.meta.outputs.date }})" \
            --notes-file release_notes.md \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
