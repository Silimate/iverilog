name: Release (anylinux amd64 + manylinux2014 amd64 + macOS arm64)

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    name: Build anylinux amd64 tarball (musl)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build tarball in Alpine container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            --platform linux/amd64 \
            alpine:3.20 sh -c '
              set -ex
              apk add --no-cache \
                build-base autoconf bison flex gperf readline-dev bzip2-dev \
                perl python3 git patchelf
              git config --global --add safe.directory /src
              autoconf
              ./configure --prefix=/usr/local
              make -j$(nproc)
              make DESTDIR=/tmp/install install

              # Bundle shared library dependencies and set RPATHs
              STAGE=/tmp/install/usr/local
              mkdir -p "$STAGE/lib"

              copy_deps() {
                for f in "$@"; do
                  [ -f "$f" ] || continue
                  ldd "$f" 2>/dev/null | awk "/=>/ {print \$3}" | while read -r lib; do
                    [ -f "$lib" ] || continue
                    base=$(basename "$lib")
                    case "$base" in ld-musl-*|libc.musl-*) continue ;; esac
                    [ -f "$STAGE/lib/$base" ] || cp "$lib" "$STAGE/lib/$base"
                  done
                done
              }

              copy_deps "$STAGE"/bin/*
              copy_deps "$STAGE"/lib/ivl/*
              copy_deps "$STAGE"/lib/*.so*

              for f in "$STAGE"/bin/*; do
                [ -f "$f" ] && patchelf --set-rpath "\$ORIGIN/../lib" "$f" 2>/dev/null || true
              done
              for f in "$STAGE"/lib/ivl/*; do
                [ -f "$f" ] && patchelf --set-rpath "\$ORIGIN/.." "$f" 2>/dev/null || true
              done
              for f in "$STAGE"/lib/*.so*; do
                [ -f "$f" ] && patchelf --set-rpath "\$ORIGIN" "$f" 2>/dev/null || true
              done

              cd /tmp/install
              tar czf /src/iverilog-anylinux-amd64.tar.gz .
            '

      - uses: actions/upload-artifact@v4
        with:
          name: iverilog-anylinux-amd64
          path: iverilog-anylinux-amd64.tar.gz

  build-manylinux:
    runs-on: ubuntu-latest
    name: Build manylinux2014 amd64 tarball (glibc 2.17+)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build tarball in CentOS 7 container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            --platform linux/amd64 \
            centos:7 bash -c '
              set -ex

              sed -i s/mirror.centos.org/vault.centos.org/g /etc/yum.repos.d/*.repo
              sed -i s/^#.*baseurl=http/baseurl=http/g /etc/yum.repos.d/*.repo
              sed -i s/^mirrorlist=http/#mirrorlist=http/g /etc/yum.repos.d/*.repo

              yum install -y centos-release-scl epel-release
              sed -i s/mirror.centos.org/vault.centos.org/g /etc/yum.repos.d/*.repo
              sed -i s/^#.*baseurl=http/baseurl=http/g /etc/yum.repos.d/*.repo
              sed -i s/^mirrorlist=http/#mirrorlist=http/g /etc/yum.repos.d/*.repo

              yum install -y devtoolset-11-gcc-c++ make autoconf flex gperf \
                readline-devel bzip2-devel perl python3 git patchelf

              source /opt/rh/devtoolset-11/enable

              # Build bison >= 3.x from source (CentOS 7 ships 2.x)
              curl -L https://ftp.gnu.org/gnu/bison/bison-3.8.2.tar.gz | tar -xzC /tmp
              cd /tmp/bison-3.8.2 && ./configure && make -j$(nproc) && make install
              cd /src

              git config --global --add safe.directory /src

              autoconf
              ./configure --prefix=/usr/local
              make -j$(nproc)
              make DESTDIR=/tmp/install install

              STAGE=/tmp/install/usr/local
              mkdir -p "$STAGE/lib"

              copy_deps() {
                for f in "$@"; do
                  [ -f "$f" ] || continue
                  ldd "$f" 2>/dev/null | awk "/=>/ {print \$3}" | while read -r lib; do
                    [ -f "$lib" ] || continue
                    base=$(basename "$lib")
                    case "$base" in ld-linux*|libc.so*|libdl*|libpthread*|librt*|libm.so*) continue ;; esac
                    [ -f "$STAGE/lib/$base" ] || cp "$lib" "$STAGE/lib/$base"
                  done
                done
              }

              copy_deps "$STAGE"/bin/*
              copy_deps "$STAGE"/lib/ivl/*
              copy_deps "$STAGE"/lib/*.so*

              for f in "$STAGE"/bin/*; do
                [ -f "$f" ] && patchelf --set-rpath "\$ORIGIN/../lib" "$f" 2>/dev/null || true
              done
              for f in "$STAGE"/lib/ivl/*; do
                [ -f "$f" ] && patchelf --set-rpath "\$ORIGIN/.." "$f" 2>/dev/null || true
              done
              for f in "$STAGE"/lib/*.so*; do
                [ -f "$f" ] && patchelf --set-rpath "\$ORIGIN" "$f" 2>/dev/null || true
              done

              cd /tmp/install
              tar czf /src/iverilog-manylinux2014-amd64.tar.gz .
            '

      - uses: actions/upload-artifact@v4
        with:
          name: iverilog-manylinux2014-amd64
          path: iverilog-manylinux2014-amd64.tar.gz

  build-macos:
    runs-on: macos-14
    name: Build macOS arm64 tarball

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          brew install autoconf bison flex gperf readline bzip2

      - name: Build and package tarball
        run: |
          set -ex
          export PATH="$(brew --prefix bison)/bin:$(brew --prefix flex)/bin:$PATH"
          export LDFLAGS="-L$(brew --prefix readline)/lib -L$(brew --prefix bzip2)/lib"
          export CPPFLAGS="-I$(brew --prefix readline)/include -I$(brew --prefix bzip2)/include"

          autoconf
          ./configure --prefix=/usr/local
          make -j$(sysctl -n hw.ncpu)
          make DESTDIR=/tmp/install install

          STAGE=/tmp/install/usr/local
          mkdir -p "$STAGE/lib"

          copy_deps() {
            for f in "$@"; do
              [ -f "$f" ] || continue
              otool -L "$f" 2>/dev/null | awk 'NR>1 {print $1}' | while read -r lib; do
                [ -f "$lib" ] || continue
                base=$(basename "$lib")
                case "$base" in libSystem*|libc++*|libobjc*) continue ;; esac
                case "$lib" in /usr/lib/*|/System/*) continue ;; esac
                [ -f "$STAGE/lib/$base" ] || cp "$lib" "$STAGE/lib/$base"
              done
            done
          }

          copy_deps "$STAGE"/bin/*
          copy_deps "$STAGE"/lib/ivl/*
          copy_deps "$STAGE"/lib/*.dylib

          for f in "$STAGE"/bin/*; do
            [ -f "$f" ] || continue
            install_name_tool -add_rpath "@executable_path/../lib" "$f" 2>/dev/null || true
            for lib in "$STAGE"/lib/*.dylib; do
              [ -f "$lib" ] || continue
              base=$(basename "$lib")
              install_name_tool -change "$(otool -L "$f" | grep "$base" | awk '{print $1}')" "@rpath/$base" "$f" 2>/dev/null || true
            done
          done
          for f in "$STAGE"/lib/ivl/*; do
            [ -f "$f" ] || continue
            install_name_tool -add_rpath "@executable_path/.." "$f" 2>/dev/null || true
            for lib in "$STAGE"/lib/*.dylib; do
              [ -f "$lib" ] || continue
              base=$(basename "$lib")
              install_name_tool -change "$(otool -L "$f" | grep "$base" | awk '{print $1}')" "@rpath/$base" "$f" 2>/dev/null || true
            done
          done
          for f in "$STAGE"/lib/*.dylib; do
            [ -f "$f" ] || continue
            install_name_tool -id "@rpath/$(basename "$f")" "$f" 2>/dev/null || true
          done

          cd /tmp/install
          tar czf "${{ github.workspace }}/iverilog-macos-arm64.tar.gz" .

      - uses: actions/upload-artifact@v4
        with:
          name: iverilog-macos-arm64
          path: iverilog-macos-arm64.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-manylinux, build-macos]
    name: Create GitHub releases

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate release notes
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          FULL_SHA=$(git rev-parse HEAD)
          DATE=$(date -u +%Y-%m-%d)
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          printf '%s\n' \
            "Automated build from \`master\` @ [\`${SHORT_SHA}\`](${REPO_URL}/commit/${FULL_SHA})" \
            "" \
            "**Built:** ${DATE}" \
            "" \
            "### Assets" \
            "| File | Platform |" \
            "|------|----------|" \
            "| \`iverilog-anylinux-amd64.tar.gz\` | Linux x86-64 (musl, statically portable) |" \
            "| \`iverilog-manylinux2014-amd64.tar.gz\` | Linux x86-64 (manylinux2014, glibc 2.17+) |" \
            "| \`iverilog-macos-arm64.tar.gz\` | macOS Apple Silicon |" \
            "" \
            "### Installation" \
            "\`\`\`bash" \
            "sudo tar xzf iverilog-<platform>.tar.gz -C /" \
            "\`\`\`" \
            > release_notes.md

      - name: Create permanent release
        run: |
          TAG="build-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.short_sha }}"
          gh release create "$TAG" \
            iverilog-anylinux-amd64.tar.gz \
            iverilog-manylinux2014-amd64.tar.gz \
            iverilog-macos-arm64.tar.gz \
            --target "${{ github.sha }}" \
            --title "Build ${{ steps.meta.outputs.date }} (${{ steps.meta.outputs.short_sha }})" \
            --notes-file release_notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest release
        run: |
          git tag -f latest HEAD
          git push -f origin latest
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest \
            iverilog-anylinux-amd64.tar.gz \
            iverilog-manylinux2014-amd64.tar.gz \
            iverilog-macos-arm64.tar.gz \
            --target "${{ github.sha }}" \
            --title "Latest Build (${{ steps.meta.outputs.date }})" \
            --notes-file release_notes.md \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
